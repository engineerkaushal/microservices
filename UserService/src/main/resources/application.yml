server:
  port: 9091


spring:
  application:
    name: USER-SERVICE
  config:
    import: optional:configserver:http://localhost:9095

  datasource:
    url: jdbc:mysql://localhost:3306/microservices
    username: root
    password: 12345
    driver-class-name: com.mysql.cj.jdbc.Driver

# Hibernate configuration
  jpa:
    show-sql: true
    generate-ddl: true
    hibernate:
      ddl-auto: update
    properties:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect
#  profiles:
#    active:
#      - dev

#eureka:
#  instance:
#    prefer-ip-address: true
#  client:
#    fetch-registry: true
#    register-with-eureka: true
#    service-url:
#      defaultZone: http://localhost:8761/eureka/

management:
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include:
          - health
  endpoint:
    health:
      show-details: always

resilience4j:
  circuitbreaker:
    instances:
      ratingHotelBreaker:
        registerHealthIndicator: true
        eventConsumerBufferSize: 10
        failureRateThreshold: 50
        minimumNumberOfCalls: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowSize: 10
        slidingWindowType: COUNT_BASED

  ratelimiter:
    instances:
      userRateLimiter:
        limitForPeriod: 2 #maximum number of call
        limitRefreshPeriod: 10s # 2 calls in 10 second
        timeoutDuration: 500ms # maximum time before rejecting the call after the particular limit reach

  retry:
    instances:
      ratingHotelRetryBreaker:
        maxAttempts: 3
        waitDuration: 5s
